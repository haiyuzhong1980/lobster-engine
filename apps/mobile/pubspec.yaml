name: tangping_lobster
description: 躺平龙虾 — Your life, your lobster's game
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  dio: ^5.4.0
  web_socket_channel: ^3.0.0
  flutter_blue_plus: ^1.32.0
  sensors_plus: ^5.0.0
  geolocator: ^12.0.0
  rive: ^0.13.0
  hive: ^4.0.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/sounds/
    - assets/images/
