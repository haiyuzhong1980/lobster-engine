---
# ConfigMap — environment variables shared across gateway and worker
apiVersion: v1
kind: ConfigMap
metadata:
  name: lobster-engine-config
  namespace: lobster-engine
  labels:
    app.kubernetes.io/name: lobster-engine
    app.kubernetes.io/component: config
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  # NATS server URL — update to point at your NATS cluster/service
  NATS_URL: "nats://nats.nats-system.svc.cluster.local:4222"
  # Gateway listen port (must match containerPort below)
  PORT: "3000"
  # Storage backend: sqlite | redis | postgres
  STORAGE_BACKEND: "redis"
  REDIS_URL: "redis://redis.lobster-engine.svc.cluster.local:6379"

---
# Secret template — replace placeholder values before applying
apiVersion: v1
kind: Secret
metadata:
  name: lobster-engine-secrets
  namespace: lobster-engine
  labels:
    app.kubernetes.io/name: lobster-engine
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # AI platform API keys — populate before applying
  OPENCLAW_API_KEY: "REPLACE_ME"
  COZE_API_KEY: "REPLACE_ME"
  DIFY_API_KEY: "REPLACE_ME"
  DIRECT_API_KEY: "REPLACE_ME"
  # Database (if using postgres storage)
  POSTGRES_URL: "postgresql://user:REPLACE_ME@postgres.lobster-engine.svc.cluster.local:5432/lobster"

---
# Deployment — Gateway (HTTP entry point)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lobster-gateway
  namespace: lobster-engine
  labels:
    app.kubernetes.io/name: lobster-engine
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lobster-engine
      app.kubernetes.io/component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lobster-engine
        app.kubernetes.io/component: gateway
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: lobster-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: ghcr.io/user/lobster-engine/gateway:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: lobster-engine-config
            - secretRef:
                name: lobster-engine-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
# Deployment — Worker (bot runtime instances)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lobster-worker
  namespace: lobster-engine
  labels:
    app.kubernetes.io/name: lobster-engine
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: lobster-engine
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lobster-engine
        app.kubernetes.io/component: worker
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: lobster-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: ghcr.io/user/lobster-engine/worker:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: lobster-engine-config
            - secretRef:
                name: lobster-engine-secrets
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('net').connect(process.env.HEALTH_PORT || 9091, '127.0.0.1').on('connect', () => process.exit(0)).on('error', () => process.exit(1))"
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('net').connect(process.env.HEALTH_PORT || 9091, '127.0.0.1').on('connect', () => process.exit(0)).on('error', () => process.exit(1))"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lobster-engine
  namespace: lobster-engine
  labels:
    app.kubernetes.io/name: lobster-engine
automountServiceAccountToken: false
