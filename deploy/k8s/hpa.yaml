---
# HorizontalPodAutoscaler — Worker
# Scales between 3 (min) and 20 (max) replicas.
# Scale-up triggers: CPU > 70% OR NATS queue depth > 100 msgs per pod.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lobster-worker
  namespace: lobster-engine
  labels:
    app.kubernetes.io/name: lobster-engine
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lobster-worker
  minReplicas: 3
  maxReplicas: 20
  metrics:
    # Standard CPU metric
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Custom metric — NATS queue depth (messages waiting per pod)
    # Requires Prometheus Adapter or KEDA to expose this metric via the
    # custom.metrics.k8s.io API.  The metric name below matches the
    # Prometheus recording rule:
    #   record: nats_worker_queue_depth_per_pod
    #   expr: nats_consumer_num_pending / count(up{job="lobster-worker"})
    - type: Pods
      pods:
        metric:
          name: nats_worker_queue_depth_per_pod
        target:
          type: AverageValue
          averageValue: "100"

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        # Allow adding up to 4 pods at a time, at most once every 60 seconds
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        # Remove at most 1 pod per 120 seconds to prevent thrashing
        - type: Pods
          value: 1
          periodSeconds: 120

---
# HorizontalPodAutoscaler — Gateway
# Gateway is lightly scaled; keep 1-3 replicas based on CPU.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lobster-gateway
  namespace: lobster-engine
  labels:
    app.kubernetes.io/name: lobster-engine
    app.kubernetes.io/component: gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lobster-gateway
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
